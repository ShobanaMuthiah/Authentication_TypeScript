name: Manual Fullstack CI/CD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install backend dependencies
        run: |
          cd BackEnd
          npm install
          npm run build

      - name: Install frontend dependencies
        run: |
          cd FrontEnd
          npm install
          npm run build
